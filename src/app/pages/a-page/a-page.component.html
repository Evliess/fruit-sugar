<div class="login-container">


  <div class="login-content">
    <nz-tabset>
      <nz-tab nzTitle="生成口令">
        <div class="login-header">
          <h2 class="title">生成口令</h2>
        </div>
        <div nz-form class="login-form">
          <nz-form-item>
            <nz-input-group nzPrefixIcon="user" nzSize="large">
              <input type="text" (input)="inputName($event)" nz-input placeholder="请输入用户名" />
            </nz-input-group>
          </nz-form-item>

          <nz-form-item>
            <nz-input-group nzPrefixIcon="clock-circle" nzSize="large">
              <input type="text" (input)="inputDays($event)" nz-input placeholder="请输入有效期" />
            </nz-input-group>
          </nz-form-item>
          <button (click)="generate()" nz-button class="login-button" [nzType]="'primary'" [nzSize]="'default'">
            生成
          </button>

          <!-- Generated tokens list -->
          @if (generatedTokens.length > 0) {
            <div class="tokens-list">
              <h3 class="tokens-title">已生成的口令</h3>
              <ul class="tokens-ul">
                @for (item of generatedTokens; track item.token) {
                  <li class="token-item">
                    <div class="token-content">
                      <span class="token-text">{{ item.token }}</span>
                      <span class="token-meta">用户: {{ item.name }}, 有效期: {{ item.days }}天</span>
                    </div>
                    <button nz-button [nzSize]="'small'" (click)="copyToken(item.token)" class="copy-button">
                      复制
                    </button>
                  </li>
                }
              </ul>
            </div>
          }
        </div>
      </nz-tab>
      <nz-tab nzTitle="撤销口令">
        <div class="login-header">
          <h2 class="title">撤销口令</h2>
        </div>
        <div nz-form class="login-form">
          <nz-form-item>
            <nz-input-group nzPrefixIcon="key" nzSize="large">
              <input type="text" (input)="inputToken($event)" nz-input placeholder="请输入要撤销的口令" />
            </nz-input-group>
          </nz-form-item>

          <button (click)="revoke()" nz-button class="login-button" [nzType]="'primary'" [nzSize]="'default'">
            撤销
          </button>
        </div>
      </nz-tab>
    </nz-tabset>


  </div>
</div>
